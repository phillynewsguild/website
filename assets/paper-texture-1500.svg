<svg width="1500" height="1500" viewBox="0 0 1500 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Newsprint texture, cool grayscale">
  <defs>
    <!-- Fractal-noise grain, desaturated then re-tinted cool (blue channel weighted
         highest) so it reads as newsprint gray with a cool undertone, not warm/sepia.
         Matches the existing hero/footer grain technique already used on the site. -->
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feColorMatrix in="mono" type="matrix"
        values="0.82 0 0 0 0
                 0    0.86 0 0 0
                 0    0    0.97 0 0
                 0    0    0    1 0"
        result="cool"/>
      <feComponentTransfer in="cool" result="contrast">
        <feFuncR type="linear" slope="1.35" intercept="-0.15"/>
        <feFuncG type="linear" slope="1.35" intercept="-0.15"/>
        <feFuncB type="linear" slope="1.35" intercept="-0.15"/>
      </feComponentTransfer>
    </filter>

    <!-- Low-frequency turbulence for soft crinkles and folds - large, elongated,
         cloud-like tonal shifts (not fine grain). Two octave counts composited
         so the folds read as irregular creases rather than a uniform blob. -->
    <filter id="crinkle" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.011" numOctaves="4" seed="11" stitchTiles="stitch" result="fold"/>
      <feColorMatrix in="fold" type="saturate" values="0" result="foldMono"/>
      <feComponentTransfer in="foldMono" result="foldContrast">
        <feFuncR type="linear" slope="2.4" intercept="-0.7"/>
        <feFuncG type="linear" slope="2.4" intercept="-0.7"/>
        <feFuncB type="linear" slope="2.4" intercept="-0.7"/>
      </feComponentTransfer>
      <feColorMatrix in="foldContrast" type="matrix"
        values="0.8 0 0 0 0
                 0   0.85 0 0 0
                 0   0    0.98 0 0
                 0   0    0    1 0"
        result="foldCool"/>
      <feGaussianBlur in="foldCool" stdDeviation="4"/>
    </filter>

    <!-- Halftone dot screen, rotated off-axis like a real newsprint plate. -->
    <pattern id="halftone" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(22)">
      <circle cx="3.5" cy="3.5" r="0.65" fill="#1C2733"/>
    </pattern>

    <!-- Faint horizontal fiber lines for a paper-stock feel. -->
    <pattern id="fibers" width="3" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(-4)">
      <rect x="0" y="0" width="3" height="0.6" fill="#0F1720"/>
    </pattern>
  </defs>

  <!-- Base tone: light neutral gray shifted cool (slightly higher blue than red/green),
       sitting between the site's paper white (#FFFFFF) and bone gray (#F1F1F1). -->
  <rect width="1500" height="1500" fill="#EEF0F2"/>

  <!-- Crinkle layer - soft, large-scale folds sitting under the fine grain. Multiply
       blend so it reads as shadow within the paper rather than a flat gray wash. -->
  <rect width="1500" height="1500" filter="url(#crinkle)" opacity="0.22" style="mix-blend-mode:multiply"/>

  <!-- Grain layer -->
  <rect width="1500" height="1500" filter="url(#grain)" opacity="0.09"/>

  <!-- Halftone dot layer -->
  <rect width="1500" height="1500" fill="url(#halftone)" opacity="0.045"/>

  <!-- Fiber layer -->
  <rect width="1500" height="1500" fill="url(#fibers)" opacity="0.03"/>

  <!-- Gentle vignette so edges read slightly deeper than center, like a printed sheet. -->
  <rect width="1500" height="1500" fill="#1C2733" opacity="0.02"/>
</svg>
